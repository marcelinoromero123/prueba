<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMDUX | Portal de Juegos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="img/logo-pato.png" alt="Pato Lumdux" class="logo-img">
            <h1 class="logo-text">LUMDUX</h1>
        </div>

        <div class="search-bar">
            <input type="text" id="buscador" placeholder="Busca tu juego favorito...">
            <button id="btn-buscar">🔍</button>
        </div>
    </header>

    <main class="container">
        <section class="game-grid" id="grid-juegos">
            <a href="vistas/juego1.html" class="game-card">
                <img src="img/thumbnails/juego1.jpg" alt="Juego 1">
                <span>Nombre del Juego 1</span>
            </a>
            </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
